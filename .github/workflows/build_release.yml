name: Build & Release

# Dispara quando uma tag no formato v1.0.0 é publicada
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # necessário para criar a release no GitHub

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      # ── 1. Checkout do código ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Extrair versão da tag (ex: v1.2.3 → 1.2.3) ───────────────────────
      - name: Extrair versão da tag
        id: version
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Versao detectada: $version"

      # ── 4. Instalar dependências do cliente ──────────────────────────────────
      # Instalamos apenas o que o cliente PyQt usa.
      # O requirements.txt do projeto inclui deps do servidor (psycopg2, FastAPI,
      # etc.) que não precisam ser empacotadas no executável.
      - name: Instalar dependências do cliente
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install `
            PySide6==6.11.1 `
            requests `
            reportlab `
            "qrcode[pil]" `
            Pillow `
            odfpy `
            openpyxl `
            pandas `
            python-dotenv `
            psutil `
            pyinstaller

      # ── 5. Injetar versão no version.py do cliente ──────────────────────────
      - name: Atualizar version.py
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          Set-Content -Path "client/version.py" -Value "CURRENT_VERSION = `"$v`"" -Encoding utf8
          Write-Host "client/version.py atualizado para $v"

      # ── 6. Build com PyInstaller ─────────────────────────────────────────────
      - name: Build com PyInstaller
        shell: pwsh
        run: |
          pyinstaller requisicoes.spec --noconfirm
          Write-Host "Build concluido. Conteudo de dist/requisicoes:"
          Get-ChildItem dist/requisicoes | Select-Object Name, Length

      # ── 7. Build do instalador com Inno Setup ────────────────────────────────
      - name: Build instalador (Inno Setup)
        shell: pwsh
        run: |
          $iscc    = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $version = "${{ steps.version.outputs.VERSION }}"
          & $iscc "/DMyAppVersion=$version" "/DBuildRoot=dist\requisicoes" installer_script.iss
          Write-Host "Instalador gerado em installer_output/"
          Get-ChildItem installer_output/

      # ── 8. Criar pacote portátil (ZIP) ───────────────────────────────────────
      - name: Criar ZIP portátil
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zipName = "Requisicoes_Portable_v${version}.zip"
          Compress-Archive -Path "dist\requisicoes\*" -DestinationPath "dist\$zipName"
          Write-Host "ZIP criado: dist/$zipName"

      # ── 9. Publicar no GitHub Releases ───────────────────────────────────────
      - name: Publicar no GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: "Requisições Pinheiro v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            installer_output/Requisicoes_Setup_v${{ steps.version.outputs.VERSION }}.exe
            dist/Requisicoes_Portable_v${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
